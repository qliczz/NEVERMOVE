name: Release

# 推 v* 标签时自动编译并发布插件包到 GitHub Release
# 例： git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud (编译引用源，自托管)
        shell: pwsh
        run: |
          # goatcorp/Dalamud 的 "latest" Release 已不再提供 Dalamud.zip 资源，
          # 故改为下载本仓库自托管的、与 XIVLauncherCN Hooks 完全一致的 Dalamud 引用程序集包
          # （仅含编译所需的 .dll，已在本地验证可零错误编译）。
          # 该资源为公开 Release 资产，无需鉴权即可下载。
          $lib = "$PWD/lib"
          $url = "https://github.com/qliczz/NEVERMOVE/releases/download/ci-deps/Dalamud.zip"
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "$PWD/dalamud.zip" -ErrorAction Stop
              break
            } catch {
              if ($i -eq $max) { throw }
              Start-Sleep -Seconds 5
            }
          }
          Expand-Archive -Path "$PWD/dalamud.zip" -DestinationPath $lib -Force
          # DALAMUD_HOME 结尾必须带反斜杠（SDK 拼 HintPath 用）
          "DALAMUD_HOME=$lib\" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build & Pack
        run: dotnet build NEVERMOVE.csproj -c Release

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          Copy-Item "bin/Release/NEVERMOVE/latest.zip" -Destination "NEVERMOVE.zip" -Force

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NEVERMOVE ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            NEVERMOVE.zip
            pluginmaster.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
