name: Release

# 推 v* 标签时自动编译并发布插件包到 GitHub Release
# 例： git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud (编译引用源)
        shell: pwsh
        run: |
          # XIVLauncherCN 使用的 Dalamud 与国际服同源（goatcorp/Dalamud），
          # API Level 15 一致；这里取最新 Dalamud 发行包作为编译引用。
          $lib = "$PWD/lib"
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/goatcorp/Dalamud/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq 'Dalamud.zip' }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$PWD/dalamud.zip"
          Expand-Archive -Path "$PWD/dalamud.zip" -DestinationPath $lib -Force
          # DALAMUD_HOME 结尾必须带反斜杠（SDK 拼 HintPath 用）
          "DALAMUD_HOME=$lib\" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build & Pack
        run: dotnet build NEVERMOVE/NEVERMOVE.csproj -c Release

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          Copy-Item "NEVERMOVE/bin/Release/NEVERMOVE/latest.zip" -Destination "NEVERMOVE.zip" -Force

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NEVERMOVE ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            NEVERMOVE.zip
            NEVERMOVE/pluginmaster.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
